name: Deploy to GitHub Pages

on:
  # Déclenche le déploiement à chaque push sur la branche `main`
  push:
    branches: [main]
  # Permet aussi de lancer le workflow manuellement depuis l'onglet Actions
  workflow_dispatch:

# Permissions nécessaires au déploiement GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement concurrent
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4
      - name: Install, build, and upload your site
        uses: withastro/action@v3
        # with:
        #   path: . # Racine du projet Astro dans le dépôt (optionnel)
        #   node-version: 20 # Version de Node utilisée pour le build (optionnel)
        #   package-manager: npm # Gestionnaire de paquets (détecté via le lockfile)

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
